<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taha Birthday Surprise</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#07152f;
  --blue:#4da3ff;
  --sky:#5ee7ff;
  --teal:#38ffd0;
  --gold:#ffd166;
  --orange:#ff9f43;
  --purple:#9b7bff;
  --white:#ffffff;
}
html,body{min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:white;background:var(--navy);overflow-x:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.bg{position:fixed;inset:-25%;z-index:1;background:
  radial-gradient(circle at 12% 16%,rgba(77,163,255,.58),transparent 24%),
  radial-gradient(circle at 82% 12%,rgba(56,255,208,.40),transparent 27%),
  radial-gradient(circle at 30% 85%,rgba(255,209,102,.36),transparent 28%),
  radial-gradient(circle at 82% 78%,rgba(155,123,255,.34),transparent 28%),
  linear-gradient(135deg,#07152f,#0b2a4d 45%,#041023 100%);
  filter:blur(10px);animation:bgMove 9s ease-in-out infinite alternate}
@keyframes bgMove{to{transform:scale(1.06) rotate(4deg)}}
.stage{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;padding:12px}
.card{width:min(780px,94vw);min-height:auto;max-height:calc(100dvh - 24px);border-radius:30px;padding:clamp(18px,4vw,38px);text-align:center;background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.24);box-shadow:0 25px 80px rgba(0,0,0,.50),inset 0 0 55px rgba(255,255,255,.06);backdrop-filter:blur(24px);overflow:auto;position:relative}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;margin:0 0 22px 0}
.badge{display:inline-block;padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.20);color:#e5fbff;font-size:12px;letter-spacing:.18em;text-transform:uppercase;white-space:nowrap}
h1{font-size:clamp(34px,6.2vw,68px);line-height:.98;letter-spacing:-1.2px;margin:14px 0 18px}
h2{font-size:clamp(28px,4.6vw,46px);line-height:1.04;letter-spacing:-.5px;margin:12px 0 16px}
.gradient{background:linear-gradient(90deg,#fff,var(--gold),var(--sky),var(--teal),var(--purple),#fff);background-size:360% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:textGlow 4.5s linear infinite}
@keyframes textGlow{to{background-position:360% center}}
.subtitle{max-width:740px;margin:0 auto 24px;font-size:clamp(15px,2.2vw,20px);line-height:1.65;color:rgba(255,255,255,.88)}
.highlight-line{display:inline-block;margin:8px auto 20px;padding:12px 18px;border-radius:18px;background:rgba(94,231,255,.14);border:1px solid rgba(94,231,255,.35);color:#dffbff;font-weight:850;box-shadow:0 0 24px rgba(94,231,255,.13)}
.panel{padding:clamp(16px,2.5vw,24px);border-radius:24px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.16);margin:16px auto;max-width:680px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px auto;max-width:720px}
.small{font-size:14px;color:rgba(255,255,255,.72);line-height:1.6}.error{color:var(--gold);margin-top:10px;font-weight:800}
.timer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.time-box{padding:13px 8px;border-radius:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.13)}.time-num{display:block;font-size:clamp(22px,3.6vw,36px);font-weight:950;color:var(--gold);line-height:1}.time-label{display:block;margin-top:8px;font-size:11px;color:rgba(255,255,255,.70);text-transform:uppercase;letter-spacing:.1em}
input{width:100%;max-width:430px;display:block;margin:12px auto;padding:16px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.13);color:white;outline:none;font-size:18px;text-align:center}input::placeholder{color:rgba(255,255,255,.55)}
button{border:none;width:min(440px,100%);padding:17px 22px;border-radius:999px;font-weight:950;font-size:17px;color:#061326;background:linear-gradient(135deg,var(--gold),var(--sky),var(--teal));cursor:pointer;box-shadow:0 18px 42px rgba(94,231,255,.22);margin-top:12px;transition:.18s}button:hover{transform:translateY(-2px)}button:active{transform:scale(.97)}.secondary{width:auto;min-width:92px;padding:9px 13px;margin:0!important;font-size:13px;color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);box-shadow:none;white-space:nowrap}.secondary.music-on{opacity:.72;filter:saturate(.75)}
.typebox{min-height:300px;display:grid;place-items:center;white-space:pre-line;font-size:clamp(20px,3vw,32px);line-height:1.8;color:rgba(255,255,255,.96)}.scan-row{margin:18px 0;text-align:left}.scan-label{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px;font-size:15px}.bar{height:13px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.14)}.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold));border-radius:inherit;transition:width .1s linear}.hidden{display:none!important}.count{font-size:clamp(130px,25vw,240px);font-weight:1000;color:var(--gold);text-shadow:0 0 60px rgba(255,209,102,.85);animation:pop .7s ease both}@keyframes pop{from{transform:scale(.35);opacity:0}60%{transform:scale(1.12);opacity:1}to{transform:scale(1)}}.crown{font-size:clamp(100px,18vw,170px);filter:drop-shadow(0 0 26px rgba(94,231,255,.8));animation:float 2.5s ease-in-out infinite}@keyframes float{50%{transform:translateY(-18px) rotate(2deg)}}
.cake-area{min-height:410px;display:grid;place-items:center}.cake{width:min(430px,86vw);height:350px;position:relative;cursor:pointer}.plate{position:absolute;left:8%;right:8%;bottom:18px;height:34px;border-radius:50%;background:rgba(255,255,255,.75)}.layer{position:absolute;left:16%;right:16%;height:76px;border-radius:24px 24px 18px 18px;box-shadow:inset 0 -12px rgba(0,0,0,.12)}.l1{bottom:42px;background:linear-gradient(135deg,#207dff,#38ffd0)}.l2{left:22%;right:22%;bottom:106px;background:linear-gradient(135deg,#ffd166,#ff9f43)}.l3{left:29%;right:29%;bottom:170px;background:linear-gradient(135deg,#9b7bff,#5ee7ff)}.icing{position:absolute;left:0;top:0;width:100%;height:22px;border-radius:22px;background:rgba(255,255,255,.9)}.candle{position:absolute;left:50%;bottom:235px;width:22px;height:76px;transform:translateX(-50%);border-radius:10px;background:repeating-linear-gradient(45deg,white 0 9px,#207dff 9px 18px)}.flame{position:absolute;left:50%;bottom:315px;width:38px;height:52px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle at 50% 60%,#fff 0 10%,#ffd166 25%,#ff7b00 65%,transparent 70%);filter:drop-shadow(0 0 25px #ffd166);animation:flame .65s infinite alternate ease-in-out}@keyframes flame{to{transform:translateX(-50%) scale(1.15) rotate(5deg)}}.cake.blown .flame{opacity:0;transition:.4s}.smoke{position:absolute;left:50%;bottom:320px;transform:translateX(-50%);opacity:0;font-size:42px}.cake.blown .smoke{animation:smoke 1.2s forwards ease}@keyframes smoke{from{opacity:1;transform:translate(-50%,0)}to{opacity:0;transform:translate(-50%,-75px)}}
.envelope-area{min-height:370px;display:grid;place-items:center;perspective:1000px}.envelope{width:min(420px,84vw);height:255px;position:relative;cursor:pointer;filter:drop-shadow(0 25px 45px rgba(0,0,0,.45))}.env-body{position:absolute;inset:72px 0 0;border-radius:0 0 24px 24px;background:linear-gradient(135deg,#207dff,#38ffd0);overflow:hidden}.env-body:before,.env-body:after{content:"";position:absolute;bottom:0;width:65%;height:100%;background:rgba(255,255,255,.22)}.env-body:before{left:0;clip-path:polygon(0 0,100% 100%,0 100%)}.env-body:after{right:0;clip-path:polygon(100% 0,0 100%,100% 100%)}.flap{position:absolute;left:0;top:72px;width:100%;height:115px;background:linear-gradient(135deg,#ffd166,#5ee7ff);clip-path:polygon(0 0,50% 100%,100% 0);transform-origin:top;transition:transform .8s ease;z-index:3}.letter-card{position:absolute;left:8%;right:8%;top:24px;height:145px;border-radius:18px;background:rgba(255,255,255,.95);color:#061326;display:grid;place-items:center;padding:18px;font-weight:950;transform:translateY(58px);transition:transform .85s ease .2s;z-index:2;font-size:clamp(15px,2vw,20px);line-height:1.35}.envelope.open .flap{transform:rotateX(180deg)}.envelope.open .letter-card{transform:translateY(-86px)}.revealed-note{margin:18px auto 0;padding:16px 18px;border-radius:22px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:white;font-size:clamp(17px,2.4vw,24px);line-height:1.55;font-weight:850;max-width:650px}.letter{text-align:left;line-height:1.85;font-size:clamp(16px,2vw,19px);color:rgba(255,255,255,.92)}.letter p{margin-bottom:16px}
.final-img{width:min(360px,86vw);max-height:420px;object-fit:cover;border-radius:26px;margin:18px auto;display:block;border:2px solid rgba(255,255,255,.28);box-shadow:0 22px 55px rgba(0,0,0,.42),0 0 34px rgba(94,231,255,.24)}.star-game{min-height:440px;position:relative;overflow:hidden;border-radius:28px;background:radial-gradient(circle at top,#154e87,transparent 55%),linear-gradient(180deg,#071f42,#030b18);border:1px solid rgba(255,255,255,.14);margin:20px auto;max-width:760px}.game-item{position:absolute;border:none;border-radius:999px;width:48px;height:48px;margin:0;padding:0;font-weight:950;color:white;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.20);box-shadow:0 0 20px rgba(94,231,255,.15);cursor:pointer;animation:bubbleFloat 3.2s ease-in-out infinite}.target-letter{background:rgba(255,255,255,.14);color:white}@keyframes bubbleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.decor{position:absolute;font-size:24px;opacity:.9;animation:float 3s ease-in-out infinite}.progress{font-size:clamp(28px,5vw,46px);letter-spacing:.22em;color:var(--gold);font-weight:950;margin-top:12px}.blessing.selected{background:linear-gradient(135deg,var(--gold),var(--sky),var(--teal));color:#061326}
@media(max-width:720px){.stage{min-height:100dvh;display:block;padding:8px}.card{width:100%;min-height:auto;max-height:none;border-radius:22px;padding:14px 12px 28px;overflow:visible}.top-row{margin:0 0 12px 0;gap:8px}.badge{font-size:9.5px;letter-spacing:.09em;padding:7px 9px;max-width:62%;overflow:hidden;text-overflow:ellipsis}.secondary{min-width:76px;padding:7px 9px;font-size:11px}.grid{grid-template-columns:1fr;gap:10px;margin:12px auto}.timer-grid{grid-template-columns:repeat(2,1fr);gap:8px}h1{font-size:clamp(30px,10vw,46px);line-height:1;letter-spacing:-.5px;margin:10px 0 14px}h2{font-size:clamp(25px,8vw,36px);line-height:1.05}.subtitle{font-size:14px;line-height:1.48;margin-bottom:14px}.panel{margin:12px auto;padding:14px;border-radius:20px}.typebox{min-height:200px;font-size:clamp(17px,5vw,23px)}.star-game{min-height:360px}.game-item{width:42px;height:42px}.progress{font-size:clamp(24px,8vw,34px)}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="bg"></div>
<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>
<section class="stage"><main class="card" id="app"><div class="badge">Loading</div><h1 class="gradient">Birthday Surprise</h1><p class="subtitle">Starting...</p></main></section>
<script>
(function(){
'use strict';
var app=document.getElementById('app');
var canvas=document.getElementById('fx');
var ctx=canvas.getContext('2d');
var birthday=new Date('2026-06-12T00:00:00+05:00');
var colors=['#4da3ff','#5ee7ff','#38ffd0','#ffd166','#ff9f43','#9b7bff','#ffffff'];
var timerInterval=null,effects=[],stars=[],musicStarted=false,starProgress=0;
function rand(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function resize(){canvas.width=window.innerWidth*window.devicePixelRatio;canvas.height=window.innerHeight*window.devicePixelRatio;canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);}
window.addEventListener('resize',resize);resize();
for(var si=0;si<110;si++){stars.push({x:rand(0,window.innerWidth),y:rand(0,window.innerHeight),r:rand(1,3),vx:rand(-.12,.12),vy:rand(.04,.22),a:rand(.18,.82),c:pick(colors)});}
function startMusic(){
  if(musicStarted)return;
  musicStarted=true;
  var mb=document.getElementById('musicBtn');
  if(mb){mb.textContent='Music On ♪';mb.className+=' music-on';mb.disabled=true;}
  var audio=document.getElementById('bgMusic');
  if(audio){audio.volume=0.65;audio.play().catch(function(){});}
}
function rocket(){var sx=rand(40,window.innerWidth-40),tx=rand(80,window.innerWidth-80),ty=rand(80,window.innerHeight*.48);effects.push({type:'rocket',x:sx,y:window.innerHeight+20,tx:tx,ty:ty,vx:(tx-sx)/42,vy:(ty-window.innerHeight)/42,life:42,c:pick(colors)});}
function burst(x,y,power){power=power||1;var c=pick(colors),count=Math.floor(60*power);for(var i=0;i<count;i++){var a=Math.PI*2*i/count,speed=rand(2,6)*power;effects.push({type:'spark',x:x,y:y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,life:rand(42,78),max:78,r:rand(1.4,3.2),c:c});}}
function hearts(count){count=count||25;for(var i=0;i<count;i++){effects.push({type:'heart',x:rand(0,window.innerWidth),y:window.innerHeight+rand(0,120),vx:rand(-.6,.6),vy:rand(-3.2,-1.4),life:rand(90,150),max:150,r:rand(15,28),c:pick(['#5ee7ff','#38ffd0','#ffd166','#4da3ff'])});}}
function drawHeart(x,y,s,c,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=c;ctx.translate(x,y);ctx.scale(s/24,s/24);ctx.beginPath();ctx.moveTo(0,8);ctx.bezierCurveTo(-22,-8,-12,-29,0,-14);ctx.bezierCurveTo(12,-29,22,-8,0,8);ctx.fill();ctx.restore();}
function nameFirework(){var temp=document.createElement('canvas'),t=temp.getContext('2d');temp.width=700;temp.height=240;t.fillStyle='white';t.font='900 155px Arial';t.textAlign='center';t.textBaseline='middle';t.fillText('TAHA',350,120);var img=t.getImageData(0,0,temp.width,temp.height).data,scale=Math.min(window.innerWidth*.82/temp.width,.62),ox=window.innerWidth/2-temp.width*scale/2,oy=window.innerHeight*.27;for(var y=0;y<temp.height;y+=10){for(var x=0;x<temp.width;x+=10){if(img[(y*temp.width+x)*4+3]>100&&Math.random()>.46){effects.push({type:'text',x:rand(0,window.innerWidth),y:rand(0,window.innerHeight),tx:ox+x*scale,ty:oy+y*scale,life:125,max:125,r:rand(1.5,2.8),c:pick(colors)});}}}}
function animate(){ctx.clearRect(0,0,window.innerWidth,window.innerHeight);for(var si=0;si<stars.length;si++){var s=stars[si];s.x+=s.vx;s.y+=s.vy;if(s.y>window.innerHeight){s.y=-10;s.x=rand(0,window.innerWidth);}ctx.globalAlpha=s.a;ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}for(var i=effects.length-1;i>=0;i--){var e=effects[i];if(e.type==='rocket'){e.x+=e.vx;e.y+=e.vy;e.life--;ctx.globalAlpha=.95;ctx.strokeStyle=e.c;ctx.shadowColor=e.c;ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(e.x,e.y+18);ctx.lineTo(e.x,e.y);ctx.stroke();ctx.shadowBlur=0;if(e.life<=0){burst(e.tx,e.ty,rand(.85,1.15));effects.splice(i,1);}continue;}if(e.type==='text'){e.x+=(e.tx-e.x)*.055;e.y+=(e.ty-e.y)*.055;e.life--;}else{e.x+=e.vx;e.y+=e.vy;if(e.type!=='heart')e.vy+=.04;e.life--;}var alpha=Math.max(e.life/e.max,0);if(e.type==='heart')drawHeart(e.x,e.y,e.r,e.c,alpha);else{ctx.globalAlpha=alpha;ctx.fillStyle=e.c;ctx.shadowColor=e.c;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}if(e.life<=0)effects.splice(i,1);}ctx.globalAlpha=1;window.requestAnimationFrame(animate);}animate();
function musicBtn(){return '<button class="secondary" id="musicBtn">Music ♪</button>';}
function attachMusic(){var b=document.getElementById('musicBtn');if(!b)return;if(musicStarted){b.textContent='Music On ♪';b.className+=' music-on';b.disabled=true;}else{b.onclick=startMusic;}}
function show(html){if(timerInterval)window.clearInterval(timerInterval);var idx=html.indexOf('</div>');if(html.indexOf('<div class="badge">')===0&&idx>-1){html='<div class="top-row">'+html.substring(0,idx+6)+musicBtn()+'</div>'+html.substring(idx+6);}else{html=musicBtn()+html;}app.innerHTML=html;attachMusic();}
function timerBlock(){return '<div class="panel"><p class="small" id="timerTitle">Time tracker</p><div class="timer-grid"><div class="time-box"><span class="time-num" id="days">0</span><span class="time-label">Days</span></div><div class="time-box"><span class="time-num" id="hours">0</span><span class="time-label">Hours</span></div><div class="time-box"><span class="time-num" id="mins">0</span><span class="time-label">Minutes</span></div><div class="time-box"><span class="time-num" id="secs">0</span><span class="time-label">Seconds</span></div></div></div>';}
function startTimer(){function tick(){var now=new Date(),diff=now-birthday,before=diff<0;diff=Math.abs(diff);var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000),title=document.getElementById('timerTitle');if(title)title.textContent=before?'Time remaining until 12 June 2026':'Time passed since 12 June 2026';var ids=['days','hours','mins','secs'],vals=[d,h,m,s];for(var i=0;i<ids.length;i++){var el=document.getElementById(ids[i]);if(el)el.textContent=vals[i];}}tick();timerInterval=window.setInterval(tick,1000);}
function boot(){show('<div class="badge">Birthday Protocol</div><h1 class="gradient">Birthday Surprise</h1><p class="subtitle">A colourful birthday experience made for <b>Taha</b>.</p><div class="grid">'+timerBlock()+'<div class="panel"><p class="small">Birthday Date</p><h2 class="gradient" style="font-size:clamp(30px,5vw,54px);margin:12px 0;">12 June 2026</h2></div></div><button id="enterBtn">Open Surprise</button>');startTimer();document.getElementById('enterBtn').onclick=function(){verify('');};}
function verify(error){show('<div class="badge">Secure Birthday Access</div><h2 class="gradient">Verification</h2><p class="subtitle">Enter the birthday boy name and PIN to unlock the surprise.<br><b>PIN is 8 digits.</b></p><div class="panel"><input id="name" placeholder="Birthday Boy Name" autocomplete="off"><input id="uid" placeholder="8-digit PIN" autocomplete="off" inputmode="numeric">'+(error?'<p class="error">'+error+'</p>':'')+'</div><button id="unlockBtn">Unlock Surprise</button>');document.getElementById('unlockBtn').onclick=checkAccess;setTimeout(function(){var n=document.getElementById('name');if(n)n.focus();},100);}
function checkAccess(){var name=document.getElementById('name').value.trim().toLowerCase(),pin=document.getElementById('uid').value.trim().toLowerCase(),nameOK=name==='taha',pinOK=pin==='12062004';if(!nameOK&&!pinOK){verify('Name and PIN are not correct yet.');return;}if(!nameOK){verify('Name is not correct yet.');return;}if(!pinOK){verify('PIN is not correct yet.');return;}startMusic();accessGranted();}
function accessGranted(){for(var i=0;i<4;i++)window.setTimeout(rocket,i*180);show('<div class="badge">Access Granted</div><h2 class="gradient">Welcome, Taha</h2><p class="subtitle">The birthday surprise has been unlocked.</p><div class="highlight-line">Each part continues only when you click.</div><br><button id="firstBtn">Open First Surprise</button>');document.getElementById('firstBtn').onclick=giftIntro;}
function surpriseScreen(num,next,title){show('<div class="badge">Surprise '+num+'</div><h2 class="gradient">'+title+'</h2><div class="highlight-line">Something special is waiting for you.</div><p class="subtitle">Tap below when you are ready.</p><button id="surpriseBtn">Open Surprise '+num+'</button>');document.getElementById('surpriseBtn').onclick=next;}
function typeScene(lines,title,next,badge){show('<div class="badge">'+badge+'</div><h2 class="gradient">'+title+'</h2><div class="panel typebox" id="typebox"></div>');var box=document.getElementById('typebox'),text=lines.join('\n\n'),i=0;function step(){if(i<text.length){box.textContent+=text.charAt(i);i++;window.setTimeout(step,18);}else{var b=document.createElement('button');b.textContent='Continue';b.onclick=next;app.appendChild(b);}}step();}
function giftIntro(){hearts(32);typeScene(['Some people bring gifts.','Some people bring cake.','Some people send a normal message.','This one is different.','A few lines of code turned into a birthday surprise.','Happy Birthday, Taha! 🎉'],'A Different Kind of Gift',scan,'First Surprise');}
function scan(){show('<div class="badge">Birthday Scan</div><h2 class="gradient">Taha Analysis</h2><div class="panel"><div class="scan-row"><div class="scan-label"><span>Legend Level</span><b id="meter0">0%</b></div><div class="bar"><div class="fill"></div></div></div><div class="scan-row"><div class="scan-label"><span>Smile Energy</span><b id="meter1">0%</b></div><div class="bar"><div class="fill"></div></div></div><div class="scan-row"><div class="scan-label"><span>Birthday Power</span><b id="meter2">0%</b></div><div class="bar"><div class="fill"></div></div></div><div class="scan-row"><div class="scan-label"><span>Birthday Boy Status</span><b id="meter3">0%</b></div><div class="bar"><div class="fill"></div></div></div></div><button id="scanBtn" class="hidden">Continue</button>');var fills=document.querySelectorAll('.fill');for(var i=0;i<fills.length;i++){(function(index){window.setTimeout(function(){animateMeter(index,fills[index]);},500+index*1500);})(i);}window.setTimeout(function(){var b=document.getElementById('scanBtn');b.classList.remove('hidden');b.onclick=countdown;},7000);}
function animateMeter(index,fill){var label=document.getElementById('meter'+index);var val=0;var timer=window.setInterval(function(){val+=2;if(val>100)val=100;fill.style.width=val+'%';if(label)label.textContent=index===3&&val===100?'CONFIRMED':val+'%';if(val>=100)window.clearInterval(timer);},28);}
function countdown(){var n=3;show('<div class="badge">Birthday Reveal</div><div class="count">3</div>');var int=window.setInterval(function(){n--;if(n>0)show('<div class="badge">Birthday Reveal</div><div class="count">'+n+'</div>');else{window.clearInterval(int);reveal();}},850);}
function reveal(){for(var i=0;i<10;i++)window.setTimeout(rocket,i*140);window.setTimeout(nameFirework,600);show('<div class="badge">12 June 2026</div><h1 class="gradient">Happy Birthday<br>Taha</h1><p class="subtitle">Today belongs to the Birthday Boy.</p><div class="crown">👑</div><button id="cakeGo">Go to Cake Wish</button>');document.getElementById('cakeGo').onclick=cakeScene;}
function cakeScene(){show('<div class="badge">22nd Birthday Wish</div><h2 class="gradient">Make a wish</h2><p class="subtitle" id="cakeText">The candle is burning. Tap the cake to blow it out.</p><div class="cake-area"><div class="cake" id="cake"><div class="flame"></div><div class="smoke">☁</div><div class="candle"></div><div class="layer l3"><div class="icing"></div></div><div class="layer l2"><div class="icing"></div></div><div class="layer l1"><div class="icing"></div></div><div class="plate"></div></div></div><button id="cakeBtn" class="hidden">Open Birthday Letter</button>');document.getElementById('cake').onclick=blowCandle;document.getElementById('cakeBtn').onclick=function(){surpriseScreen(2,envelopeScene,'Birthday Letter');};}
function blowCandle(){var cake=document.getElementById('cake');if(!cake||cake.className.indexOf('blown')>-1)return;cake.className+=' blown';hearts(40);for(var i=0;i<6;i++)window.setTimeout(rocket,i*160);window.setTimeout(function(){document.getElementById('cakeText').innerHTML='<b>Happy 22nd Birthday, Taha!</b><br>May this year bring success, peace, happiness, and amazing memories.';document.getElementById('cakeBtn').classList.remove('hidden');},700);}
function envelopeScene(){show('<div class="badge">Birthday Letter</div><h2 class="gradient">A letter is waiting</h2><p class="subtitle">Tap the envelope to open it.</p><div class="envelope-area"><div class="envelope" id="envelope"><div class="letter-card">For Taha 🎉</div><div class="flap"></div><div class="env-body"></div></div></div><div id="letterHint" class="revealed-note hidden">Your birthday letter is open now.</div><button id="letterBtn" class="hidden">Read Message</button>');document.getElementById('envelope').onclick=openEnvelope;document.getElementById('letterBtn').onclick=birthdayMessage;}
function openEnvelope(){var env=document.getElementById('envelope');if(!env||env.className.indexOf('open')>-1)return;env.className+=' open';hearts(25);window.setTimeout(function(){document.getElementById('letterHint').classList.remove('hidden');document.getElementById('letterBtn').classList.remove('hidden');},900);}
function birthdayMessage(){show('<div class="badge">For Taha</div><h2 class="gradient">Birthday Message</h2><div class="panel letter"><p>Happy birthday to the person who turned my “ordinary” into “favorite” 🥺✨ To my person, my safe place, my favorite notification 📱💕</p><p>Loving you doesn’t feel like a choice anymore, it feels like home. You make my heart do stupid happy things and I never want that to stop. Every laugh with you, every quiet moment, every dumb thing we do - it all feels more special because it’s with you. Thank you for making my world softer, brighter, and so much warmer just by being in it, and I’m so grateful the universe put us in the same timeline.</p><p>I don’t just wish you a happy birthday... I wish you a lifetime of the kind of happiness you give me every single day. Here’s to more cake, more cuddles, and more “us” this year 🥳🎉 I love you endlessly ❤️🎂🥂 Forever yours, always.</p></div><button id="starBtn">Next</button>');document.getElementById('starBtn').onclick=function(){surpriseScreen(3,starGame,'Find Your Name In The Stars');};}
function starGame(){starProgress=0;show('<div class="badge">Birthday Star Game</div><h2 class="gradient">Find Your Name</h2><p class="subtitle">Find the letters of TAHA hidden in the birthday sky.</p><div class="progress" id="nameProgress">_ _ _ _</div><div class="star-game" id="starGame"></div>');buildStars();}
function buildStars(){var area=document.getElementById('starGame'),letters=['T','A','H','A'],fake='BCDEFGIJKLMNOPQRSUVWXYZ'.split(''),decor=['🎈','🎂','✨','🎉','🌟','🎁','⚡','🚀'];for(var d=0;d<18;d++){var sp=document.createElement('span');sp.className='decor';sp.textContent=pick(decor);sp.style.left=rand(3,92)+'%';sp.style.top=rand(5,88)+'%';sp.style.animationDelay=rand(0,2)+'s';area.appendChild(sp);}for(var i=0;i<24;i++){var btn=document.createElement('button');btn.className='game-item';btn.textContent=pick(fake);btn.style.left=rand(5,88)+'%';btn.style.top=rand(8,82)+'%';btn.style.animationDelay=rand(0,2)+'s';btn.onclick=function(){this.style.opacity='.25';};area.appendChild(btn);}for(var j=0;j<letters.length;j++){var good=document.createElement('button');good.className='game-item target-letter';good.textContent=letters[j];good.setAttribute('data-letter',letters[j]);good.style.left=rand(8,85)+'%';good.style.top=rand(10,80)+'%';good.style.animationDelay=rand(0,2)+'s';good.onclick=function(){clickLetter(this.getAttribute('data-letter'),this);};area.appendChild(good);}}
function clickLetter(letter,btn){var target='TAHA';if(letter!==target.charAt(starProgress)){btn.style.transform='scale(.8)';setTimeout(function(){btn.style.transform='scale(1)';},180);return;}btn.style.visibility='hidden';starProgress++;hearts(8);var shown='';for(var i=0;i<target.length;i++){shown+=i<starProgress?target.charAt(i):'_';shown+=' ';}document.getElementById('nameProgress').textContent=shown;if(starProgress===target.length){for(var r=0;r<8;r++)window.setTimeout(rocket,r*120);window.setTimeout(function(){nameFirework();blessingGame();},1200);}}
function blessingGame(){show('<div class="badge">Blessing Cards</div><h2 class="gradient">Choose 4 Blessings</h2><p class="subtitle">Pick four wishes for Taha this year.</p><div class="panel" id="blessingPanel" style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:720px;"><button class="blessing">Peace</button><button class="blessing">Success</button><button class="blessing">Good Health</button><button class="blessing">Happiness</button><button class="blessing">Confidence</button><button class="blessing">Beautiful Memories</button><button class="blessing">Barakah</button><button class="blessing">Dreams Come True</button></div><p class="small" id="blessingCount">Selected: 0 / 4</p><div id="duaBox" class="revealed-note hidden">May Allah fill Taha’s life with peace, happiness, good health, success, and countless reasons to smile. Ameen. 🤍</div><button id="smileOpenBtn" class="hidden">Continue</button>');var buttons=document.querySelectorAll('.blessing');for(var i=0;i<buttons.length;i++){buttons[i].onclick=function(){selectBlessing(this);};}document.getElementById('smileOpenBtn').onclick=smileUnlock;}
function selectBlessing(btn){if(btn.className.indexOf('selected')>-1)return;var selected=document.querySelectorAll('.blessing.selected').length;if(selected>=4)return;btn.className+=' selected';hearts(8);selected++;document.getElementById('blessingCount').textContent='Selected: '+selected+' / 4';if(selected===4){for(var i=0;i<5;i++)window.setTimeout(rocket,i*130);window.setTimeout(function(){document.getElementById('duaBox').classList.remove('hidden');document.getElementById('smileOpenBtn').classList.remove('hidden');},650);}}
function smileUnlock(){show('<div class="badge">Final Unlock</div><h2 class="gradient">One Last Key</h2><p class="subtitle">Type SMILE to unlock the final message.</p><div class="panel"><input id="smileInput" placeholder="Type SMILE" autocomplete="off"><p id="smileError" class="error hidden">Try again. The key is SMILE.</p></div><button id="smileBtn">Unlock Final Message</button>');document.getElementById('smileBtn').onclick=checkSmile;setTimeout(function(){var input=document.getElementById('smileInput');if(input)input.focus();},100);}
function checkSmile(){var val=document.getElementById('smileInput').value.trim().toLowerCase();if(val==='smile'){finale();}else{document.getElementById('smileError').classList.remove('hidden');}}
function finale(){for(var i=0;i<12;i++)window.setTimeout(rocket,i*130);hearts(55);typeScene(['SYSTEM MESSAGE','Birthday successfully completed.','Result: Taha smiled. 😊','Happiness level increased. 🌟','Mission accomplished. 🎉'],'Final Result',finalFireworks,'Birthday Surprise');}
function finalFireworks(){show('<div class="badge">Finale</div><h1 class="gradient">Happy 22nd Birthday,<br>Taha</h1><p class="subtitle">May this year be full of happiness, peace, success, and beautiful memories. 🤍</p><img src="taha.jpg" class="final-img" alt="Taha birthday photo"><div class="crown">🎆</div><button id="replayBtn">Replay</button>');for(var i=0;i<18;i++)window.setTimeout(rocket,i*160);hearts(80);window.setTimeout(nameFirework,900);document.getElementById('replayBtn').onclick=boot;}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{boot();}
})();
</script>
</body>
</html>
